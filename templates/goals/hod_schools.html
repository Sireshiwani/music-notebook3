{% extends "base.html" %}
{% block title %}Schools (HOD) - Shajara{% endblock %}
{% block content %}
<div class="container py-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('goals.hod_dashboard') }}">HOD</a></li>
            <li class="breadcrumb-item active">Schools</li>
        </ol>
    </nav>
    <div class="row">
        <div class="col-md-5">
            <div class="card shadow-sm mb-3">
                <div class="card-header">New school</div>
                <div class="card-body">
                    <form method="post">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        <input type="text" name="name" class="form-control mb-2" placeholder="School name" required>
                        <button type="submit" class="btn btn-primary">Create</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <ul class="list-group">
                {% for s in schools %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    {{ s.name }}
                    <a href="{{ url_for('goals.hod_school_detail', school_id=s.id) }}" class="btn btn-sm btn-primary">Manage</a>
                </li>
                {% else %}
                <li class="list-group-item text-muted">No schools yet.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
{% endblock %}
